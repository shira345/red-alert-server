name: Check Oref Alerts
on:
  workflow_dispatch:
  schedule:
    - cron: '*/1 * * * *'

jobs:
  run-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install firebase-admin axios
      - name: Run script
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}$
        run: node index.js
